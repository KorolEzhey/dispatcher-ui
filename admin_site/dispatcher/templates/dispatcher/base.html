<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Диспетчер{% endblock %}</title>
    <link rel="icon" href="{% static 'dispatcher/favicon.svg' %}" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --primary-light: #EFF6FF;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --sidebar-w: 180px;
            --detail-w: 420px;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

        .layout { display: flex; min-height: 100vh; }

        /* ---- SIDEBAR ---- */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
        }
        .sidebar-brand {
            padding: 16px 16px 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            letter-spacing: -.2px;
        }
        .sidebar-nav { padding: 12px 0; flex: 1; }
        .sidebar-nav a {
            display: block;
            padding: 9px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13.5px;
            transition: background .15s, color .15s;
        }
        .sidebar-nav a:hover { background: var(--primary-light); color: var(--primary); }
        .sidebar-nav a.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }

        /* ---- MAIN ---- */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: margin-right .25s ease;
        }
        .main.detail-open { margin-right: var(--detail-w); }

        /* ---- TOPBAR ---- */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar-title { font-size: 18px; font-weight: 600; color: var(--text); }
        .topbar-search {
            flex: 1;
            max-width: 320px;
            position: relative;
        }
        .topbar-search input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 12px 7px 34px;
            font-size: 13px;
            background: var(--bg);
            color: var(--text);
            transition: border .15s, box-shadow .15s;
        }
        .topbar-search input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .topbar-search input::placeholder { color: var(--text-muted); }
        .topbar-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .topbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
        .topbar-badge {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--bg); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 14px; cursor: pointer;
            transition: background .15s;
        }
        .topbar-badge:hover { background: var(--primary-light); color: var(--primary); }
        .topbar-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); position: absolute; top: 6px; right: 6px; }

        /* ---- CONTENT ---- */
        .content { padding: 20px 28px; flex: 1; }

        /* ---- STATUS TABS ---- */
        .status-tabs {
            display: flex;
            gap: 4px;
            padding: 0;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .status-tabs a {
            padding: 10px 16px;
            font-size: 15px;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: color .15s, border-color .15s;
        }
        .status-tabs a:hover { color: var(--primary); }
        .status-tabs a.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
        .status-tabs .tab-count {
            font-size: 11px;
            background: var(--bg);
            color: var(--text-muted);
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 4px;
        }
        .status-tabs a.active .tab-count { background: var(--primary-light); color: var(--primary); }

        /* ---- FILTER ROW ---- */
        .filter-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }
        .filter-row select, .filter-row input[type=text] {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            background: var(--surface);
            color: var(--text);
        }
        .filter-row select:focus, .filter-row input[type=text]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .filter-row input::placeholder { color: var(--text-muted); }

        /* ---- TABLE ---- */
        .req-table {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
        }
        .req-table thead th {
            background: var(--bg);
            color: #334155;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .3px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }
        .req-table tbody tr { cursor: pointer; transition: background .12s; }
        .req-table tbody tr:hover { background: #F1F5F9; }
        .req-table tbody tr.selected { background: #DBEAFE; }
        .req-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }
        .req-table tbody tr:last-child td { border-bottom: none; }

        /* ---- BADGES ---- */
        .badge {
            border: none;
            font-weight: 500;
            border-radius: 6px;
            padding: 3px 9px;
            font-size: 12px;
        }
        .badge-status-accepted    { background: #DBEAFE; color: #1E40AF; }
        .badge-status-in_progress { background: #FEF3C7; color: #92400E; }
        .badge-status-need_info   { background: #EDE9FE; color: #5B21B6; }
        .badge-status-done        { background: #DCFCE7; color: #166534; }
        .badge-status-rejected    { background: #FEE2E2; color: #991B1B; }
        .badge-type-emergency     { background: #FEE2E2; color: #991B1B; }
        .badge-type-complaint     { background: #FEF3C7; color: #92400E; }
        .badge-type-request       { background: #DBEAFE; color: #1E40AF; }
        .badge-type-question      { background: #EDE9FE; color: #5B21B6; }
        .badge-type-proposal      { background: #DCFCE7; color: #166534; }
        .badge-sentiment-negative { background: #FEE2E2; color: #991B1B; }
        .badge-sentiment-neutral  { background: #F1F5F9; color: #475569; }
        .badge-sentiment-positive { background: #DCFCE7; color: #166534; }

        /* ---- DETAIL PANEL ---- */
        .detail-panel {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: var(--detail-w);
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 90;
            transform: translateX(100%);
            transition: transform .25s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .detail-panel.open { transform: translateX(0); }
        .detail-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .detail-header h6 { margin: 0; font-size: 15px; font-weight: 600; }
        .detail-close {
            width: 28px; height: 28px;
            border: none; background: var(--bg);
            border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 16px;
            transition: background .15s;
        }
        .detail-close:hover { background: #FEE2E2; color: #991B1B; }
        .detail-body { flex: 1; overflow-y: auto; padding: 20px; }
        .detail-field { margin-bottom: 14px; }
        .detail-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 3px; }
        .detail-value { font-size: 13.5px; color: var(--text); }
        .detail-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
        .detail-actions {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        /* ---- FORM in detail ---- */
        .detail-actions label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; }
        .detail-actions select, .detail-actions textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 13px;
            background: var(--surface);
            color: var(--text);
            margin-bottom: 10px;
        }
        .detail-actions select:focus, .detail-actions textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .detail-actions textarea { resize: vertical; min-height: 56px; }
        .detail-actions .hint { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; margin-top: -6px; }
        .detail-actions .btn-primary {
            width: 100%;
            background: var(--primary);
            border-color: var(--primary);
            border-radius: 8px;
            font-size: 13px;
            padding: 8px;
        }
        .detail-actions .btn-primary:hover { background: var(--primary-hover); }

        /* ---- PAGINATION ---- */
        .pagination { margin-top: 14px; }
        .pagination .page-link {
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            padding: 5px 10px;
            border-radius: 6px;
            margin: 0 2px;
        }
        .pagination .page-link:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .pagination .page-item.active .page-link { background: var(--primary); border-color: var(--primary); color: #fff; }

        /* ---- BUTTONS ---- */
        .btn { font-size: 13px; }
        .btn-primary { background: var(--primary); border-color: var(--primary); border-radius: 8px; }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
        .btn-outline-secondary { border-radius: 8px; color: var(--text-secondary); border-color: var(--border); }

        /* ---- EMPTY STATE ---- */
        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
        .empty-state svg { margin-bottom: 8px; }

        /* ---- MISC ---- */
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-hover); }

        /* toast notification */
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; }

        /* ---- DIGEST ---- */
        .digest-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .digest-card { padding: 16px; }
        .digest-card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .3px; }
        .digest-card-value { font-size: 26px; font-weight: 700; margin-top: 4px; color: var(--text); }
        .digest-bar-wrap { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: var(--bg); margin-bottom: 12px; }
        .digest-bar-segment { height: 100%; transition: width .3s; }
        .digest-legend { display: flex; flex-wrap: wrap; gap: 10px; }
        .digest-legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); }
        .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
        .digest-house-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .digest-house-row:last-child { border-bottom: none; }
        .digest-house-rank { width: 22px; height: 22px; border-radius: 6px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text-secondary); }
        .digest-status-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .digest-status-row:last-child { border-bottom: none; }

        /* ---- SETTINGS ---- */
        .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .settings-row:last-child { border-bottom: none; }
        .settings-label { font-size: 13px; font-weight: 500; color: var(--text); }
        .settings-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .settings-value { font-size: 13px; font-weight: 600; color: var(--primary); font-family: 'SF Mono', 'Fira Code', monospace; }
        .settings-rule { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .settings-rule:last-child { border-bottom: none; }

        /* ---- MOBILE FILTER SHEET ---- */
        .filter-toggle-mobile { display: none; }
        .filter-sheet { display: none; }

        /* ---- MOBILE ---- */
        .mobile-header { display: none; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform .25s; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .main.detail-open { margin-right: 0; }

            .mobile-header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 16px 0;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                position: sticky;
                top: 0;
                z-index: 50;
                flex-wrap: wrap;
            }
            .mobile-burger {
                width: 32px; height: 32px;
                border: none; background: var(--bg);
                border-radius: 6px; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                color: var(--text-secondary); font-size: 18px;
            }
            .mobile-title { font-size: 16px; font-weight: 600; }
            .mobile-search {
                flex: 1 1 100%;
                margin-bottom: 10px;
            }
            .mobile-search input {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 7px 12px;
                font-size: 13px;
                background: var(--bg);
                color: var(--text);
            }
            .mobile-search input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
            .mobile-search input::placeholder { color: var(--text-muted); }

            .topbar { display: none; }

            .content { padding: 12px 16px; }

            .detail-panel {
                width: 100%;
                transform: translateY(100%);
                border-left: none;
                border-top: 1px solid var(--border);
                border-radius: 16px 16px 0 0;
            }
            .detail-panel.open { transform: translateY(0); }

            .sidebar-overlay {
                position: fixed; inset: 0;
                background: rgba(0,0,0,.3);
                z-index: 99;
                display: none;
            }
            .sidebar-overlay.show { display: block; }

            /* TABLE → CARDS */
            .req-table, .req-table thead, .req-table tbody, .req-table th, .req-table td, .req-table tr {
                display: block;
                border: none;
            }
            .req-table { background: none; border: none; border-radius: 0; overflow: visible; }
            .req-table thead { display: none; }
            .req-table tbody tr {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                margin-bottom: 10px;
                padding: 12px 14px;
                cursor: pointer;
                transition: background .12s;
            }
            .req-table tbody tr:hover { background: #F1F5F9; }
            .req-table tbody tr.selected { background: #DBEAFE; }
            .req-table tbody tr:last-child td { border-bottom: none; }
            .req-table td {
                padding: 2px 0;
                border-bottom: none;
                font-size: 13px;
                vertical-align: baseline;
            }
            .req-table td:before {
                content: attr(data-label);
                display: inline-block;
                width: 90px;
                color: var(--text-muted);
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: .3px;
            }
            .req-table td:first-child {
                font-size: 15px;
                font-weight: 600;
                margin-bottom: 4px;
            }
            .req-table td:first-child:before { display: none; }

            .filter-row { display: none; }

            .filter-toggle-mobile {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 10px;
                padding: 7px 14px;
                border: 1px solid var(--border);
                border-radius: 8px;
                background: var(--surface);
                color: var(--text-secondary);
                font-size: 13px;
                font-family: inherit;
                cursor: pointer;
            }
            .filter-dot {
                width: 7px; height: 7px;
                border-radius: 50%;
                background: var(--primary);
            }

            .filter-sheet { display: block; }
            .filter-sheet-overlay {
                position: fixed; inset: 0;
                background: rgba(0,0,0,.3);
                z-index: 110;
                display: none;
            }
            .filter-sheet.open .filter-sheet-overlay { display: block; }
            .filter-sheet-body {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: var(--surface);
                border-radius: 16px 16px 0 0;
                padding: 20px 16px 24px;
                z-index: 111;
                transform: translateY(100%);
                transition: transform .25s ease;
            }
            .filter-sheet.open .filter-sheet-body { transform: translateY(0); }
            .filter-sheet-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
                font-weight: 600;
                font-size: 15px;
            }
            .filter-sheet-header button {
                border: none; background: var(--bg);
                border-radius: 6px; width: 28px; height: 28px;
                cursor: pointer; color: var(--text-secondary); font-size: 14px;
            }
            .filter-sheet-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 4px; display: block; }
            .filter-sheet-select {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 10px 12px;
                font-size: 14px;
                background: var(--bg);
                color: var(--text);
                margin-bottom: 14px;
                font-family: inherit;
            }

            .status-tabs { flex-wrap: wrap; gap: 0; }
            .status-tabs a { white-space: nowrap; font-size: 13px; padding: 7px 10px; flex-shrink: 0; border-bottom: none; border-radius: 8px; margin-right: 4px; margin-bottom: 4px; }
            .status-tabs a.active { background: var(--primary-light); border-bottom: none; border-radius: 8px; }

            .pagination .page-link { padding: 4px 8px; font-size: 12px; }

            .digest-grid { grid-template-columns: repeat(2, 1fr); }
            .digest-card-value { font-size: 22px; }
            .settings-row { flex-direction: column; align-items: flex-start; gap: 4px; }
            .settings-value { font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">Диспетчер</div>
        <nav class="sidebar-nav">
            <a href="{% url 'request_list' %}" class="{% block nav_requests %}{% endblock %}">Обращения</a>
            <a href="{% url 'digest' %}" class="{% block nav_digest %}{% endblock %}">Сводка</a>
            <a href="{% url 'houses' %}" class="{% block nav_houses %}{% endblock %}">Дома</a>
            <a href="{% url 'settings' %}" class="{% block nav_settings %}{% endblock %}">Настройки</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <div class="main" id="main-area">
        <!-- MOBILE HEADER -->
        <div class="mobile-header">
            <button class="mobile-burger" onclick="toggleSidebar()">&#9776;</button>
            <div class="mobile-title" id="mobile-title">Обращения</div>
            <div class="mobile-search">
                <input type="text" name="search" placeholder="Поиск по номеру..."
                       hx-get="{% url 'request_list' %}" hx-target="#table-area"
                       hx-include=".filter-row select, [name=status]"
                       hx-trigger="keyup changed delay:300ms" hx-push-url="true">
            </div>
        </div>
        <!-- TOPBAR -->
        <div class="topbar">
            <div class="topbar-title">{% block topbar_title %}Обращения{% endblock %}</div>
            <div class="topbar-search">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" name="search" placeholder="Поиск по номеру..." value="{{ search|default:'' }}" hx-get="{% url 'request_list' %}" hx-target="#table-area" hx-include=".filter-row select, [name=status]" hx-trigger="keyup changed delay:300ms" hx-push-url="true">
            </div>
            <div class="topbar-right">
                <div class="topbar-badge" style="position:relative" title="Уведомления">
                    🔔
                </div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- DETAIL PANEL -->
    <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
            <h6 id="detail-title">Обращение</h6>
            <button class="detail-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-body" id="detail-body">
        </div>
    </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="toast-container" id="toast-container"></div>

<script>
function openDetail(url) {
    fetch(url, {headers: {'HX-Request': 'true'}})
        .then(r => r.text())
        .then(html => {
            document.getElementById('detail-body').innerHTML = html;
            document.getElementById('detail-panel').classList.add('open');
            document.getElementById('main-area').classList.add('detail-open');

            document.querySelectorAll('.req-table tbody tr').forEach(tr => tr.classList.remove('selected'));
            const row = document.querySelector(`tr[data-url="${url}"]`);
            if (row) row.classList.add('selected');
        });
}

function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('main-area').classList.remove('detail-open');
    document.querySelectorAll('.req-table tbody tr').forEach(tr => tr.classList.remove('selected'));
}

function showToast(msg) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'alert alert-success';
    t.style.cssText = 'padding:10px 16px;border-radius:8px;font-size:13px;margin-top:6px;box-shadow:0 2px 8px rgba(0,0,0,.1)';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function updateTabs(el) {
    document.querySelectorAll('.status-tabs a').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
}

function syncTabs() {
    const form = document.querySelector('.filter-row');
    const params = new URLSearchParams(new FormData(form));
    document.querySelectorAll('.status-tabs a').forEach(a => {
        const href = a.getAttribute('hx-get');
        if (href) {
            const url = new URL(href, window.location.origin);
            url.searchParams.set('house', params.get('house') || '');
            url.searchParams.set('type', params.get('type') || '');
            a.setAttribute('hx-get', url.pathname + '?' + url.searchParams.toString());
        }
    });
}

function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('show');
}

function toggleFilterSheet() {
    document.getElementById('filter-sheet').classList.toggle('open');
}

document.addEventListener('DOMContentLoaded', function() {
    const t = document.querySelector('.topbar-title');
    const m = document.getElementById('mobile-title');
    if (t && m) m.textContent = t.textContent;
});

</script>
</body>
</html>
