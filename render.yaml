services:
  - type: web
    name: dispatcher-admin
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd admin_site && gunicorn admin_site.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: dispatcher-db
          property: connectionString

  - type: postgres
    name: dispatcher-db
    plan: free
